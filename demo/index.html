<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelSinter — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: monospace;
      color: #eee;
    }
    #container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    canvas {
      border: 2px solid #333;
      image-rendering: pixelated;
    }
    #info {
      font-size: 14px;
      color: #888;
    }
    #error {
      color: #ff6b6b;
      font-size: 14px;
      max-width: 600px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div id="container">
    <canvas id="canvas" width="960" height="540"></canvas>
    <div id="info">PixelSinter v0.1 — WebGPU</div>
    <div id="error"></div>
  </div>
  <script type="module" src="./demo.ts"></script>
</body>
</html>
